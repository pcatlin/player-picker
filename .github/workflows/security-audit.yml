name: Security Audit

on:
  pull_request:
  push:
    branches:
      - main
      - master

concurrency:
  group: security-audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  npm_audit_gate:
    name: npm audit gate (high/critical)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Audit gate
        run: npm run audit:gate

